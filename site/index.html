<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A11y Patterns - Copy-Paste Accessible UI Patterns</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a href="#patterns-grid" class="skip-link">Skip to patterns</a>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title">
        <span class="material-symbols-outlined site-title__icon">accessibility_new</span>
        A11y Patterns
      </h1>
      <p class="site-tagline">Copy-paste accessible UI patterns. Before/after code. Real WCAG context. No framework lock-in.</p>
    </div>
  </header>

  <main class="container">
    <section class="filters">
      <h2 class="filters__title">Filter Patterns</h2>
      <div class="filters__group">
        <label class="filter-label">
          <span class="filter-label__text">Category</span>
          <select id="category-filter" class="filter-select">
            <option value="">All Categories</option>
            <option value="01-color-contrast">Color Contrast</option>
            <option value="02-missing-alt-text">Missing Alt Text</option>
            <option value="03-form-labels">Form Labels</option>
            <option value="04-empty-links-buttons">Empty Links & Buttons</option>
            <option value="05-focus-management">Focus Management</option>
            <option value="06-keyboard-navigation">Keyboard Navigation</option>
          </select>
        </label>
        <label class="filter-label">
          <span class="filter-label__text">WCAG Level</span>
          <select id="wcag-filter" class="filter-select">
            <option value="">All Levels</option>
            <option value="A">Level A</option>
            <option value="AA">Level AA</option>
            <option value="AAA">Level AAA</option>
          </select>
        </label>
      </div>
      <div class="filters__results">
        <span id="results-count">Loading patterns...</span>
      </div>
    </section>

    <section id="patterns-grid" class="patterns-grid">
      <!-- Patterns will be loaded here by JavaScript -->
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="site-footer__text">
        Every pattern is tested with axe — <code>before/</code> must fail, <code>after/</code> must pass.
      </p>
      <p class="site-footer__text">
        <div class="github-link">        
          <a href="https://github.com/BuildMinimal/a11y-patterns" target="_blank" rel="noopener">
            <div class="github-logo">
          <svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8C0 11.54 2.29 14.53 5.47 15.59C5.87 15.66 6.02 15.42 6.02 15.21C6.02 15.02 6.01 14.39 6.01 13.72C4 14.09 3.48 13.23 3.32 12.78C3.23 12.55 2.84 11.84 2.5 11.65C2.22 11.5 1.82 11.13 2.49 11.12C3.12 11.11 3.57 11.7 3.72 11.94C4.44 13.15 5.59 12.81 6.05 12.6C6.12 12.08 6.33 11.73 6.56 11.53C4.78 11.33 2.92 10.64 2.92 7.58C2.92 6.71 3.23 5.99 3.74 5.43C3.66 5.23 3.38 4.41 3.82 3.31C3.82 3.31 4.49 3.1 6.02 4.13C6.66 3.95 7.34 3.86 8.02 3.86C8.7 3.86 9.38 3.95 10.02 4.13C11.55 3.09 12.22 3.31 12.22 3.31C12.66 4.41 12.38 5.23 12.3 5.43C12.81 5.99 13.12 6.7 13.12 7.58C13.12 10.65 11.25 11.33 9.47 11.53C9.76 11.78 10.01 12.26 10.01 13.01C10.01 14.08 10 14.94 10 15.21C10 15.42 10.15 15.67 10.55 15.59C13.71 14.53 16 11.53 16 8C16 3.58 12.42 0 8 0Z" transform="scale(64)" fill="currentColor"/>
          </svg>
        </div>
        View on GitHub</a>

        </div>
        
      </p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
