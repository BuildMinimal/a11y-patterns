    <!--
      BROKEN: Complex chart image with no alt attribute.

      For simple informative images, a brief alt text is sufficient.
      For complex images — charts, graphs, diagrams with multiple data series —
      a brief alt text cannot convey the data. Two things are needed:
        1. A brief alt describing the topic/purpose (like any informative image)
        2. A long description conveying the actual data (unique to complex images)

      Without either, the entire chart is invisible to screen reader users.
      They cannot determine the topic, the data series, the trend, or any values.

      axe rule: image-alt × 2
    -->
