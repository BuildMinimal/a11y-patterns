<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      color: #1a1a1a;
      padding: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: #1a1a1a;
    }
    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-width: 640px;
    }
    .task-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 0.875rem 1rem;
    }
    .task-label {
      flex: 1;
      font-size: 0.9375rem;
      color: #1a1a1a;
    }
    .task-actions {
      display: flex;
      gap: 0.25rem;
    }
    .task-actions button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      background: #ffffff;
      cursor: pointer;
      padding: 0;
      transition: background 0.15s;
    }
    .task-actions button:hover { background: #f1f5f9; }
    .task-actions button img {
      width: 18px;
      height: 18px;
      display: block;
    }
  </style>
</head>
<body>
  <h1>My Tasks</h1>
  <ul class="task-list">

      <span class="task-label">Review accessibility audit report</span>
