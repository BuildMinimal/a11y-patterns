<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Form - Missing Error Message Association</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="form-card">
      <h1 class="form-title">Create Account</h1>
      <p class="form-subtitle">Join us today and get started.</p>

      <form class="registration-form">
        <!-- BAD: Error message not associated with input -->
        <div class="form-field">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" class="input-error">
          <div class="error-message">Please enter a valid email address</div>
        </div>

        <!-- BAD: Error message not associated with input -->
        <div class="form-field">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" name="password" placeholder="•••••••••" class="input-error">
          <div class="error-message">Password must be at least 8 characters</div>
        </div>

        <!-- BAD: Error message not associated with input -->
        <div class="form-field">
          <label for="confirm-password" class="form-label">Confirm Password</label>
          <input type="password" id="confirm-password" name="confirm-password" placeholder="•••••••••" class="input-error">
          <div class="error-message">Passwords do not match</div>
        </div>

        <button type="submit" class="submit-button">Create Account</button>
      </form>

      <p class="form-footer">
        Already have an account? <a href="#">Sign in</a>
      </p>
    </div>
  </div>
</body>
</html>
