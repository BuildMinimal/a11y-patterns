<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icon-Only Button — Before (Broken)</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <div class="toolbar">
      <h1 class="toolbar__title">Item Actions</h1>
      <p class="toolbar__description">
        Manage this item using the buttons below.
      </p>

      <div class="toolbar__actions">
        <!-- PROBLEM 1: No aria-label or title attribute.
             Screen readers will announce this as "button" with no context.
             The user has no idea what this button does. -->
        <button class="btn btn--close">
          <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>

        <!-- PROBLEM 2: Icon color #9ca3af on #f3f4f6 = 1.23:1 — fails WCAG 1.4.11.
             The icon is barely visible, especially for users with low vision.
             The 3:1 minimum for non-text content is not met. -->
        <button class="btn btn--delete">
          <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
        </button>

        <!-- PROBLEM 3: Icon color #9ca3af on #f3f4f6 = 1.23:1 — fails WCAG 1.4.11.
             Even though this is a neutral action, the icon must be visible. -->
        <button class="btn btn--share">
          <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"></circle>
            <circle cx="6" cy="12" r="3"></circle>
            <circle cx="18" cy="19" r="3"></circle>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
          </svg>
        </button>

        <!-- PROBLEM 4: Icon color #9ca3af on #f3f4f6 = 1.23:1 — fails WCAG 1.4.11.
             The favorite icon is too subtle to be reliably seen. -->
        <button class="btn btn--favorite">
          <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
          </svg>
        </button>
      </div>

      <p class="toolbar__hint">
        Tip: Use keyboard or screen reader to test button accessibility.
      </p>
    </div>
  </main>
</body>
</html>
