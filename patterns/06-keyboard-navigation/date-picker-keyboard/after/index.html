<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Date Picker Keyboard Navigation — After (Fixed)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <div class="form-card">
      <h1 class="form-title">Book an Appointment</h1>
      <p class="form-subtitle">Choose a date using the calendar below.</p>

      <div class="field">
        <label class="field-label" for="date-input">Appointment date</label>
        <div class="datepicker-wrapper">
          <input
            type="text"
            id="date-input"
            class="date-input"
            readonly
            placeholder="DD/MM/YYYY"
          />
          <!--
            FIX: Native <button> for keyboard access.
            aria-label describes the action. aria-expanded mirrors the input state.
          -->
          <button
            id="calendar-toggle"
            class="calendar-toggle"
            aria-label="Open date picker"
            aria-haspopup="grid"
            aria-expanded="false"
          >
            <span aria-hidden="true">📅</span>
          </button>
        </div>

        <!--
          FIX: role="dialog" on the popup so screen readers announce it as a dialog.
          aria-label names the dialog. aria-modal="true" informs AT that background
          content is inert while the calendar is open.
        -->
        <div
          id="calendar"
          class="calendar"
          role="dialog"
          aria-label="Date picker"
          aria-modal="true"
          hidden
        >
          <div class="calendar-header">
            <!--
              FIX: Prev/Next are native <button> elements with descriptive aria-labels.
              aria-live="polite" on the heading announces month changes to screen readers.
            -->
            <button id="prev-month" class="cal-nav" aria-label="Go to previous month">
              <span aria-hidden="true">‹</span>
            </button>
            <h2 id="cal-heading" class="cal-heading" aria-live="polite">April 2026</h2>
            <button id="next-month" class="cal-nav" aria-label="Go to next month">
              <span aria-hidden="true">›</span>
            </button>
          </div>

          <!--
            FIX: role="grid" on <table> with aria-labelledby linking to the heading.
            <th scope="col"> for column headers (day names).
            <td role="gridcell"> for day cells.
            Only one cell has tabindex="0" at a time (roving tabindex pattern).
          -->
          <table
            id="cal-grid"
            class="calendar-grid"
            role="grid"
            aria-labelledby="cal-heading"
          >
            <thead>
              <tr role="row">
                <th scope="col" abbr="Sunday">Su</th>
                <th scope="col" abbr="Monday">Mo</th>
                <th scope="col" abbr="Tuesday">Tu</th>
                <th scope="col" abbr="Wednesday">We</th>
                <th scope="col" abbr="Thursday">Th</th>
                <th scope="col" abbr="Friday">Fr</th>
                <th scope="col" abbr="Saturday">Sa</th>
              </tr>
            </thead>
            <tbody id="cal-body">
              <!-- Generated by JS -->
            </tbody>
          </table>

          <button id="close-calendar" class="calendar-close">
            Close calendar
          </button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const MONTHS     = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const input      = document.getElementById('date-input');
    const toggleBtn  = document.getElementById('calendar-toggle');
    const calendar   = document.getElementById('calendar');
    const calHeading = document.getElementById('cal-heading');
    const calBody    = document.getElementById('cal-body');
    const prevBtn    = document.getElementById('prev-month');
    const nextBtn    = document.getElementById('next-month');
    const closeBtn   = document.getElementById('close-calendar');

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    let focusedDate  = new Date(today);
    let selectedDate = null;
    let viewYear     = today.getFullYear();
    let viewMonth    = today.getMonth();

    function dateKey(d) {
      // Returns YYYY-MM-DD string
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function openCalendar() {
      buildGrid(viewYear, viewMonth);
      calendar.hidden = false;
      toggleBtn.setAttribute('aria-expanded', 'true');
      // Move focus to the focused date cell after the calendar is visible
      const cell = calBody.querySelector('[role="gridcell"][tabindex="0"]');
      cell?.focus();
    }

    function closeCalendar(returnFocus = true) {
      calendar.hidden = true;
      toggleBtn.setAttribute('aria-expanded', 'false');
      if (returnFocus) toggleBtn.focus();
    }

    function buildGrid(y, m) {
      viewYear  = y;
      viewMonth = m;
      calHeading.textContent = `${MONTHS[m]} ${y}`;
      calBody.innerHTML = '';

      const firstDay    = new Date(y, m, 1).getDay();
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      let date = 1;

      for (let row = 0; row < 6; row++) {
        if (date > daysInMonth) break;
        const tr = document.createElement('tr');
        tr.setAttribute('role', 'row');

        for (let col = 0; col < 7; col++) {
          const td = document.createElement('td');
          td.setAttribute('role', 'gridcell');

          if ((row === 0 && col < firstDay) || date > daysInMonth) {
            // Empty cell — outside current month
            td.setAttribute('aria-disabled', 'true');
            td.setAttribute('tabindex', '-1');
          } else {
            const cellDate = new Date(y, m, date);
            const key      = dateKey(cellDate);

            td.textContent         = date;
            td.dataset.date        = key;

            // Full accessible label: "Wednesday, 17 April 2026"
            td.setAttribute('aria-label', cellDate.toLocaleDateString('en-GB', {
              weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
            }));

            if (dateKey(cellDate) === dateKey(today)) {
              td.setAttribute('aria-current', 'date');
            }
            if (selectedDate && key === dateKey(selectedDate)) {
              td.setAttribute('aria-selected', 'true');
            }

            // Roving tabindex: only the focused date is tabindex="0"
            const isFocused = key === dateKey(focusedDate) ||
                              (!isInMonth(focusedDate, y, m) && row === 0 && col === firstDay);
            td.setAttribute('tabindex', isFocused ? '0' : '-1');

            td.addEventListener('click', () => selectDate(cellDate));
            date++;
          }
          tr.appendChild(td);
        }
        calBody.appendChild(tr);
      }
    }

    function isInMonth(d, y, m) {
      return d.getFullYear() === y && d.getMonth() === m;
    }

    function selectDate(date) {
      selectedDate = new Date(date);
      focusedDate  = new Date(date);
      const dd = String(date.getDate()).padStart(2, '0');
      const mm = String(date.getMonth() + 1).padStart(2, '0');
      const yy = date.getFullYear();
      input.value = `${dd}/${mm}/${yy}`;
      closeCalendar();
    }

    function moveFocus(newDate) {
      const newY = newDate.getFullYear();
      const newM = newDate.getMonth();

      if (newY !== viewYear || newM !== viewMonth) {
        // Navigated into a new month — rebuild the grid
        focusedDate = new Date(newDate);
        buildGrid(newY, newM);
        const cell = calBody.querySelector('[role="gridcell"][tabindex="0"]');
        cell?.focus();
      } else {
        // Same month — just update roving tabindex
        const all = Array.from(calBody.querySelectorAll('[role="gridcell"][data-date]'));
        all.forEach(c => c.setAttribute('tabindex', '-1'));
        const target = all.find(c => c.dataset.date === dateKey(newDate));
        if (target) {
          target.setAttribute('tabindex', '0');
          target.focus();
          focusedDate = new Date(newDate);
        }
      }
    }

    // --- Event wiring ---

    toggleBtn.addEventListener('click', () => {
      calendar.hidden ? openCalendar() : closeCalendar();
    });

    closeBtn.addEventListener('click', () => closeCalendar());

    prevBtn.addEventListener('click', () => {
      let y = viewYear, m = viewMonth - 1;
      if (m < 0) { m = 11; y--; }
      // Keep focusedDate in same relative position or clamp to last day
      const daysInPrevMonth = new Date(y, m + 1, 0).getDate();
      const newDay = Math.min(focusedDate.getDate(), daysInPrevMonth);
      focusedDate = new Date(y, m, newDay);
      buildGrid(y, m);
      calBody.querySelector('[role="gridcell"][tabindex="0"]')?.focus();
    });

    nextBtn.addEventListener('click', () => {
      let y = viewYear, m = viewMonth + 1;
      if (m > 11) { m = 0; y++; }
      const daysInNextMonth = new Date(y, m + 1, 0).getDate();
      const newDay = Math.min(focusedDate.getDate(), daysInNextMonth);
      focusedDate = new Date(y, m, newDay);
      buildGrid(y, m);
      calBody.querySelector('[role="gridcell"][tabindex="0"]')?.focus();
    });

    // Keyboard navigation within the grid
    calendar.addEventListener('keydown', (e) => {
      const active = document.activeElement;
      if (!active?.dataset?.date) return;

      const parts = active.dataset.date.split('-');
      const cur   = new Date(+parts[0], +parts[1] - 1, +parts[2]);
      let next;

      switch (e.key) {
        case 'ArrowRight':  e.preventDefault(); next = new Date(cur); next.setDate(cur.getDate() + 1); moveFocus(next); break;
        case 'ArrowLeft':   e.preventDefault(); next = new Date(cur); next.setDate(cur.getDate() - 1); moveFocus(next); break;
        case 'ArrowDown':   e.preventDefault(); next = new Date(cur); next.setDate(cur.getDate() + 7); moveFocus(next); break;
        case 'ArrowUp':     e.preventDefault(); next = new Date(cur); next.setDate(cur.getDate() - 7); moveFocus(next); break;
        case 'Home':        e.preventDefault(); next = new Date(cur); next.setDate(cur.getDate() - cur.getDay()); moveFocus(next); break;
        case 'End':         e.preventDefault(); next = new Date(cur); next.setDate(cur.getDate() + (6 - cur.getDay())); moveFocus(next); break;
        case 'PageUp':      e.preventDefault(); next = new Date(cur); next.setMonth(cur.getMonth() - 1); moveFocus(next); break;
        case 'PageDown':    e.preventDefault(); next = new Date(cur); next.setMonth(cur.getMonth() + 1); moveFocus(next); break;
        case 'Enter':
        case ' ':           e.preventDefault(); selectDate(cur); break;
        case 'Escape':      e.preventDefault(); closeCalendar(); break;
      }
    });

    // Close on outside click
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.datepicker-wrapper') && !e.target.closest('#calendar')) {
        if (!calendar.hidden) closeCalendar(false);
      }
    });
  </script>
</body>
</html>
