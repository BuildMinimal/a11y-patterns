<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Table Navigation — After (Fixed)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <header class="page-header">
      <h1 class="page-title">Accessibility Tools</h1>
      <p class="page-subtitle">Use arrow keys to navigate. Press Enter or Space on a column header to sort.</p>
    </header>

    <!-- FIX: aria-live region announces sort changes to screen reader users -->
    <p id="sort-status" class="sr-only" aria-live="polite" aria-atomic="true"></p>

    <div class="table-wrapper">
      <!--
        FIX: role="grid" enables arrow-key cell navigation (roving tabindex).
        aria-label names the table and hints at keyboard controls.
      -->
      <table
        id="data-table"
        class="data-table"
        role="grid"
        aria-label="Accessibility tools — sortable, use arrow keys to navigate cells"
      >
        <thead>
          <tr>
            <!--
              FIX: aria-sort on <th> communicates current sort direction to AT.
              <button> inside <th> is the keyboard-accessible sort trigger.
              scope="col" associates the header with its column of data cells.
            -->
            <th scope="col" aria-sort="none" data-col="name">
              <button class="sort-btn" tabindex="-1" aria-label="Sort by Tool name, currently unsorted">
                Tool <span class="sort-icon" aria-hidden="true">↕</span>
              </button>
            </th>
            <th scope="col" aria-sort="none" data-col="category">
              <button class="sort-btn" tabindex="-1" aria-label="Sort by Category, currently unsorted">
                Category <span class="sort-icon" aria-hidden="true">↕</span>
              </button>
            </th>
            <th scope="col" aria-sort="none" data-col="cost">
              <button class="sort-btn" tabindex="-1" aria-label="Sort by Cost, currently unsorted">
                Cost <span class="sort-icon" aria-hidden="true">↕</span>
              </button>
            </th>
            <th scope="col" aria-sort="none" data-col="year">
              <button class="sort-btn" tabindex="-1" aria-label="Sort by Year, currently unsorted">
                Year <span class="sort-icon" aria-hidden="true">↕</span>
              </button>
            </th>
          </tr>
        </thead>
        <tbody id="table-body">
          <!-- Rows rendered by JS; each <td> gets role="gridcell" and tabindex -->
        </tbody>
      </table>
    </div>
  </main>

  <script>
    const table    = document.getElementById('data-table');
    const tbody    = document.getElementById('table-body');
    const statusEl = document.getElementById('sort-status');

    const COL_NAMES = { name: 'Tool name', category: 'Category', cost: 'Cost', year: 'Year' };
    const SORT_ICONS  = { none: '↕', ascending: '↑', descending: '↓' };
    const SORT_LABELS = { none: 'currently unsorted', ascending: 'currently sorted ascending', descending: 'currently sorted descending' };

    let tools = [
      { name: 'NVDA',       category: 'Screen reader', cost: 'Free',       year: 2006 },
      { name: 'axe-core',   category: 'Testing',       cost: 'Free',       year: 2015 },
      { name: 'JAWS',       category: 'Screen reader', cost: 'Commercial', year: 1989 },
      { name: 'VoiceOver',  category: 'Screen reader', cost: 'Built-in',   year: 2005 },
      { name: 'Lighthouse', category: 'Testing',       cost: 'Built-in',   year: 2016 },
    ];

    let sortCol = null;
    let sortAsc = true;
    let focusedRow = 0;
    let focusedCol = 0;
    let grid = []; // grid[row][col] = focusable element (button or td)

    // --- Render ---

    function renderRows() {
      const sorted = sortCol
        ? [...tools].sort((a, b) => {
            const av = a[sortCol]; const bv = b[sortCol];
            return sortAsc ? (av < bv ? -1 : av > bv ? 1 : 0) : (av > bv ? -1 : av < bv ? 1 : 0);
          })
        : [...tools];

      tbody.innerHTML = sorted.map(t => `
        <tr>
          <td role="gridcell" tabindex="-1">${t.name}</td>
          <td role="gridcell" tabindex="-1">${t.category}</td>
          <td role="gridcell" tabindex="-1">${t.cost}</td>
          <td role="gridcell" tabindex="-1">${t.year}</td>
        </tr>
      `).join('');
    }

    // --- Grid structure ---

    function buildGrid() {
      grid = [];
      // Row 0: sort buttons (the focusable element inside each <th>)
      grid.push(Array.from(table.querySelectorAll('thead th button')));
      // Rows 1-N: <td> cells
      table.querySelectorAll('tbody tr').forEach(tr => {
        grid.push(Array.from(tr.querySelectorAll('td')));
      });
    }

    // --- Focus management (roving tabindex) ---

    function focusCell(row, col, skipFocus) {
      row = Math.max(0, Math.min(row, grid.length - 1));
      col = Math.max(0, Math.min(col, (grid[row]?.length ?? 1) - 1));

      // Roving tabindex: remove tabindex=0 from all, then set on target
      grid.forEach(r => r.forEach(el => el.setAttribute('tabindex', '-1')));
      const el = grid[row]?.[col];
      if (!el) return;
      el.setAttribute('tabindex', '0');
      focusedRow = row;
      focusedCol = col;
      if (!skipFocus) el.focus();
    }

    // --- Sort ---

    function updateHeaderAriaSort() {
      table.querySelectorAll('thead th[data-col]').forEach(th => {
        const col = th.dataset.col;
        const btn = th.querySelector('button');
        const dir = col === sortCol ? (sortAsc ? 'ascending' : 'descending') : 'none';
        th.setAttribute('aria-sort', dir);
        btn.querySelector('.sort-icon').textContent = SORT_ICONS[dir];
        btn.setAttribute('aria-label', `Sort by ${COL_NAMES[col]}, ${SORT_LABELS[dir]}`);
      });
    }

    function sort(col) {
      if (sortCol === col) sortAsc = !sortAsc;
      else { sortCol = col; sortAsc = true; }

      const dir = sortAsc ? 'ascending' : 'descending';
      // Announce before re-render so screen reader picks it up as a live change
      statusEl.textContent = `Table sorted by ${COL_NAMES[col]}, ${dir}.`;
      updateHeaderAriaSort();
      renderRows();
      buildGrid();

      // Restore focus to the button that triggered the sort
      focusCell(focusedRow, focusedCol);
    }

    // --- Click on sort button ---

    table.addEventListener('click', e => {
      const btn = e.target.closest('.sort-btn');
      if (!btn) return;
      const col = btn.closest('th[data-col]').dataset.col;
      sort(col);
    });

    // --- Arrow-key grid navigation ---

    table.addEventListener('keydown', e => {
      const { key, ctrlKey } = e;
      let r = focusedRow;
      let c = focusedCol;
      const lastRow = grid.length - 1;
      const rowLen  = grid[r]?.length ?? 1;

      if (key === 'ArrowRight') {
        e.preventDefault();
        c = Math.min(c + 1, rowLen - 1);
      } else if (key === 'ArrowLeft') {
        e.preventDefault();
        c = Math.max(c - 1, 0);
      } else if (key === 'ArrowDown') {
        e.preventDefault();
        r = Math.min(r + 1, lastRow);
      } else if (key === 'ArrowUp') {
        e.preventDefault();
        r = Math.max(r - 1, 0);
      } else if (key === 'Home' && !ctrlKey) {
        e.preventDefault();
        c = 0;
      } else if (key === 'End' && !ctrlKey) {
        e.preventDefault();
        c = (grid[r]?.length ?? 1) - 1;
      } else if (key === 'Home' && ctrlKey) {
        e.preventDefault();
        r = 0; c = 0;
      } else if (key === 'End' && ctrlKey) {
        e.preventDefault();
        r = lastRow; c = (grid[r]?.length ?? 1) - 1;
      } else {
        return;
      }

      focusCell(r, c);
    });

    // --- Track focus from mouse click or Tab ---

    table.addEventListener('focusin', e => {
      for (let r = 0; r < grid.length; r++) {
        for (let c = 0; c < grid[r].length; c++) {
          if (grid[r][c] === e.target) {
            grid.forEach(row => row.forEach(el => el.setAttribute('tabindex', '-1')));
            e.target.setAttribute('tabindex', '0');
            focusedRow = r;
            focusedCol = c;
            return;
          }
        }
      }
    });

    // --- Init ---

    renderRows();
    buildGrid();
    // First sort button is the Tab entry point
    focusCell(0, 0, true);
  </script>
</body>
</html>
