name: New Pattern Proposal
description: Propose a new accessible UI pattern for the repository
title: "[Pattern] "
labels: ["type: new-pattern", "status: needs-review"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a new pattern. Before you start building, let's align on scope.
        Fill in each section — incomplete proposals will be closed.

  - type: input
    id: pattern-name
    attributes:
      label: Pattern name
      description: The human-readable display name
      placeholder: "e.g. Combobox with Autocomplete"
    validations:
      required: true

  - type: input
    id: pattern-slug
    attributes:
      label: Pattern slug
      description: Kebab-case identifier for the folder name
      placeholder: "e.g. combobox-autocomplete"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - "01 — Color Contrast"
        - "02 — Missing Alt Text"
        - "03 — Form Labels"
        - "04 — Empty Links & Buttons"
        - "05 — Focus Management"
        - "06 — Keyboard Navigation"
    validations:
      required: true

  - type: dropdown
    id: wcag-criterion
    attributes:
      label: Primary WCAG criterion
      options:
        - "1.1.1 Non-text Content (A)"
        - "1.3.1 Info and Relationships (A)"
        - "1.3.5 Identify Input Purpose (AA)"
        - "1.4.1 Use of Color (A)"
        - "1.4.3 Contrast Minimum (AA)"
        - "1.4.11 Non-text Contrast (AA)"
        - "2.1.1 Keyboard (A)"
        - "2.1.2 No Keyboard Trap (A)"
        - "2.2.2 Pause, Stop, Hide (A)"
        - "2.4.1 Bypass Blocks (A)"
        - "2.4.3 Focus Order (A)"
        - "2.4.4 Link Purpose in Context (A)"
        - "2.4.9 Link Purpose Link Only (AAA)"
        - "2.4.11 Focus Appearance (AA, WCAG 2.2)"
        - "3.3.1 Error Identification (A)"
        - "3.3.2 Labels or Instructions (A)"
        - "4.1.2 Name, Role, Value (A)"
        - "4.1.3 Status Messages (AA)"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this pattern solve?
      description: Describe the specific user harm when this pattern is implemented incorrectly. Who is affected and how?
      placeholder: "Screen reader users navigating a form with no visible labels hear 'edit text' with no context about what to type. Cognitive disability users can't recover from submission errors because error messages aren't announced..."
    validations:
      required: true

  - type: textarea
    id: before-description
    attributes:
      label: What does the broken "before" version look like?
      description: Describe the specific bad implementation you'll demonstrate. Specific is better than general.
      placeholder: "An <input> with placeholder='Email address' and no <label> element. The placeholder disappears on focus, leaving the user with no reminder of what to enter."
    validations:
      required: true

  - type: textarea
    id: after-description
    attributes:
      label: What does the fixed "after" version look like?
      description: What specific changes fix the problem?
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I've searched `patterns/` and this pattern doesn't already exist
          required: true
        - label: I've searched open issues and this pattern isn't already proposed
          required: true
        - label: I can provide a working `before/` and `after/` HTML example
          required: true
        - label: I can write the axe test (or I've noted I need help with this)
          required: true
