name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Allow only one concurrent deployment per PR
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy PR preview
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages (preview branch)
        # This is a placeholder for a real static site build step.
        # When the GitHub Pages site is built (Phase 6), replace this
        # with the actual build + deploy commands.
        run: |
          echo "Preview deployment for PR #${{ github.event.pull_request.number }}"
          echo "Pattern previews will be available once the GitHub Pages site is built in Phase 6."

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🔍 **Preview**: Pattern previews will be linked here once the GitHub Pages site is built.\n\nFor now, check out the pattern files directly in the PR diff.'
            })
